<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="src/style/style.css">
    <title>calculadora</title>
</head>
<body>
    <div id="contener">
        <div id="apresent_result">
            <input type="text" id="inp_result">
        </div>
        <div id="area_button">
            <div id="btn_func_especial">
                <button id="Ac">AC</button>
                <button id="conversion">
                    <sub>+ </sub>
                        / 
                    <sup> -</sup>
                </button>
                <button id="percent">%</button>
            </div>
            <div id="btn_number">
                <button id="seven" value="7">7</button>
                <button id="eight" value="8">8</button>
                <button id="nine" value="9">9</button>
                <button id="four" value="4">4</button>
                <button id="five" value="5">5</button>
                <button id="six" value="6">6</button>
                <button id="one" value="1">1</button>
                <button id="two" value="2">2</button>
                <button id="three" value="3">3</button>
                <button id="zero" value="0">0</button>
                <button id="point" value="."><strong>.</strong></button>
            </div>
            <div id="btn_sinal_operacao">
                <button id="divisao">/</button>
                <button id="multiplicacao">x</button>
                <button id="subtracao">-</button>
                <button id="soma">+</button>
                <button id="igual">=</button>
            </div>
        </div>
    </div>
    <script src="src/js/script.js"></script>
</body>
</html>
